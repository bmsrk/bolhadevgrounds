<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Screen background -->
  <rect width="60" height="40" rx="3" fill="#0d1b2e"/>
  <!-- 2×2 video call grid ─────────────────────────────────────────────── -->
  <!-- top-left participant -->
  <rect x="3"  y="3"  width="25" height="16" rx="1" fill="#1a2a40" stroke="#2a4a70" stroke-width="0.5"/>
  <circle cx="15" cy="8"  r="3.5" fill="#e74c3c" opacity="0.85"/>
  <rect x="11" y="13" width="8" height="3.5" rx="1" fill="#e74c3c" opacity="0.4"/>
  <!-- top-right participant -->
  <rect x="32" y="3"  width="25" height="16" rx="1" fill="#1a2a40" stroke="#2a4a70" stroke-width="0.5"/>
  <circle cx="44" cy="8"  r="3.5" fill="#3498db" opacity="0.85"/>
  <rect x="40" y="13" width="8" height="3.5" rx="1" fill="#3498db" opacity="0.4"/>
  <!-- bottom-left participant -->
  <rect x="3"  y="22" width="25" height="16" rx="1" fill="#1a2a40" stroke="#2a4a70" stroke-width="0.5"/>
  <circle cx="15" cy="27" r="3.5" fill="#2ecc71" opacity="0.85"/>
  <rect x="11" y="32" width="8" height="3.5" rx="1" fill="#2ecc71" opacity="0.4"/>
  <!-- bottom-right participant (local – highlighted border) -->
  <rect x="32" y="22" width="25" height="16" rx="1" fill="#1a2a40" stroke="#f39c12" stroke-width="1"/>
  <circle cx="44" cy="27" r="3.5" fill="#f39c12" opacity="0.85"/>
  <rect x="40" y="32" width="8" height="3.5" rx="1" fill="#f39c12" opacity="0.4"/>
  <!-- Screen-edge glow -->
  <rect x="1" y="1" width="58" height="38" rx="2" fill="none" stroke="#3498db" stroke-width="0.5" opacity="0.2"/>
</svg>
