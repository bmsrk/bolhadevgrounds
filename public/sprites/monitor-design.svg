<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Screen background – dark crimson -->
  <rect width="60" height="40" rx="3" fill="#1a0810"/>
  <!-- Color-swatch palette row (top) -->
  <rect x="4"  y="4" width="10" height="10" rx="2" fill="#e74c3c"/>
  <rect x="17" y="4" width="10" height="10" rx="2" fill="#e67e22"/>
  <rect x="30" y="4" width="10" height="10" rx="2" fill="#f1c40f"/>
  <rect x="43" y="4" width="10" height="10" rx="2" fill="#2ecc71"/>
  <!-- Wireframe layout blocks -->
  <rect x="4"  y="18" width="25" height="17" rx="1.5" fill="none" stroke="#e74c3c" stroke-width="0.9" opacity="0.70"/>
  <rect x="32" y="18" width="25" height="8"  rx="1.5" fill="none" stroke="#e74c3c" stroke-width="0.8" opacity="0.55"/>
  <rect x="32" y="28" width="25" height="7"  rx="1.5" fill="none" stroke="#e74c3c" stroke-width="0.8" opacity="0.55"/>
  <!-- Image-placeholder X in the main wireframe block -->
  <line x1="4"  y1="18" x2="29" y2="35" stroke="#e74c3c" stroke-width="0.5" opacity="0.30"/>
  <line x1="29" y1="18" x2="4"  y2="35" stroke="#e74c3c" stroke-width="0.5" opacity="0.30"/>
  <!-- Screen-edge glow border -->
  <rect x="1" y="1" width="58" height="38" rx="2" fill="none" stroke="#e74c3c" stroke-width="0.5" opacity="0.15"/>
</svg>
