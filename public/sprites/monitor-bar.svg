<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Screen background – dark navy -->
  <rect width="60" height="40" rx="3" fill="#0d1b2e"/>
  <!-- Subtle grid lines -->
  <line x1="8" y1="8"  x2="57" y2="8"  stroke="#4a9eff" stroke-width="0.4" opacity="0.2"/>
  <line x1="8" y1="18" x2="57" y2="18" stroke="#4a9eff" stroke-width="0.4" opacity="0.2"/>
  <line x1="8" y1="28" x2="57" y2="28" stroke="#4a9eff" stroke-width="0.4" opacity="0.2"/>
  <!-- Bar chart – 5 bars in ascending / varied heights -->
  <rect x="9"  y="22" width="7" height="10" rx="1" fill="#4a9eff" opacity="0.90"/>
  <rect x="19" y="16" width="7" height="16" rx="1" fill="#4a9eff" opacity="0.90"/>
  <rect x="29" y="10" width="7" height="22" rx="1" fill="#2ecc71" opacity="0.90"/>
  <rect x="39" y="14" width="7" height="18" rx="1" fill="#4a9eff" opacity="0.90"/>
  <rect x="49" y="6"  width="7" height="26" rx="1" fill="#2ecc71" opacity="0.90"/>
  <!-- Baseline -->
  <line x1="8" y1="32" x2="57" y2="32" stroke="#4a9eff" stroke-width="0.7" opacity="0.4"/>
  <!-- Screen-edge glow border -->
  <rect x="1" y="1" width="58" height="38" rx="2" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
</svg>
