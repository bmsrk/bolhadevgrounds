<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Screen background – very dark -->
  <rect width="60" height="40" rx="3" fill="#060612"/>
  <!-- Floating geometric screensaver shapes -->
  <circle cx="15" cy="12" r="6"  fill="none" stroke="#9b59b6" stroke-width="1"   opacity="0.60"/>
  <circle cx="15" cy="12" r="2.5" fill="#9b59b6" opacity="0.25"/>
  <rect x="34" y="5" width="10" height="10" rx="1"
        fill="none" stroke="#1abc9c" stroke-width="1" opacity="0.60"
        transform="rotate(22 39 10)"/>
  <polygon points="44,25 51,38 37,38"
           fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.55"/>
  <circle cx="9"  cy="32" r="4"  fill="none" stroke="#f39c12" stroke-width="1"   opacity="0.50"/>
  <rect x="21" y="22" width="8" height="8" rx="1"
        fill="none" stroke="#3498db" stroke-width="1" opacity="0.55"
        transform="rotate(-18 25 26)"/>
  <!-- Subtle scanlines -->
  <line x1="0" y1="10" x2="60" y2="10" stroke="#fff" stroke-width="0.25" opacity="0.04"/>
  <line x1="0" y1="20" x2="60" y2="20" stroke="#fff" stroke-width="0.25" opacity="0.04"/>
  <line x1="0" y1="30" x2="60" y2="30" stroke="#fff" stroke-width="0.25" opacity="0.04"/>
  <!-- Dim screen border -->
  <rect x="1" y="1" width="58" height="38" rx="2" fill="none" stroke="#9b59b6" stroke-width="0.5" opacity="0.12"/>
</svg>
