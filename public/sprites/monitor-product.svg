<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Screen background – dark amber-black -->
  <rect width="60" height="40" rx="3" fill="#120e00"/>
  <!-- KPI metric boxes (top half) -->
  <rect x="4"  y="4"  width="24" height="14" rx="2" fill="none" stroke="#e67e22" stroke-width="0.9" opacity="0.80"/>
  <text x="16" y="10"  text-anchor="middle" font-size="3.8" fill="#e67e22" font-family="monospace">DAU</text>
  <text x="16" y="15.5" text-anchor="middle" font-size="5.5" fill="#f39c12" font-family="monospace" font-weight="bold">12k</text>
  <rect x="32" y="4"  width="24" height="14" rx="2" fill="none" stroke="#1abc9c" stroke-width="0.9" opacity="0.80"/>
  <text x="44" y="10"  text-anchor="middle" font-size="3.8" fill="#1abc9c" font-family="monospace">CVR</text>
  <text x="44" y="15.5" text-anchor="middle" font-size="5.5" fill="#16a085" font-family="monospace" font-weight="bold">3.2%</text>
  <!-- Trend area fill -->
  <polygon
    points="4,36 13,31 22,27 30,29 38,23 46,19 54,15 57,14 57,36"
    fill="#e67e22" opacity="0.12"/>
  <!-- Trend line (bottom half) -->
  <polyline
    points="4,36 13,31 22,27 30,29 38,23 46,19 54,15 57,14"
    fill="none" stroke="#e67e22" stroke-width="1.5"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Baseline -->
  <line x1="4" y1="36" x2="57" y2="36" stroke="#e67e22" stroke-width="0.5" opacity="0.30"/>
  <!-- Screen-edge glow border -->
  <rect x="1" y="1" width="58" height="38" rx="2" fill="none" stroke="#e67e22" stroke-width="0.5" opacity="0.15"/>
</svg>
