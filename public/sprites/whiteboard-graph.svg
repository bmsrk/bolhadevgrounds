<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50">
  <!-- Whiteboard surface -->
  <rect width="120" height="50" rx="3" fill="#f0f0ff"/>
  <!-- Whiteboard frame -->
  <rect x="0.5" y="0.5" width="119" height="49" rx="2.5" fill="none" stroke="#c8c8e8" stroke-width="1"/>
  <!-- Graph edges (drawn behind nodes) -->
  <line x1="60" y1="13" x2="60" y2="18"  stroke="#8090b0" stroke-width="1.0" opacity="0.60"/>
  <line x1="53" y1="22" x2="32" y2="20"  stroke="#8090b0" stroke-width="1.0" opacity="0.60"/>
  <line x1="67" y1="22" x2="88" y2="20"  stroke="#8090b0" stroke-width="1.0" opacity="0.60"/>
  <line x1="55" y1="29" x2="27" y2="35"  stroke="#8090b0" stroke-width="0.8" opacity="0.50"/>
  <line x1="65" y1="29" x2="93" y2="35"  stroke="#8090b0" stroke-width="0.8" opacity="0.50"/>
  <!-- Central node: API gateway -->
  <circle cx="60" cy="25" r="7" fill="#3498db" opacity="0.20"/>
  <circle cx="60" cy="25" r="7" fill="none" stroke="#3498db" stroke-width="1.5"/>
  <text x="60" y="27" text-anchor="middle" font-size="4.5" fill="#2980b9" font-family="monospace" font-weight="bold">API</text>
  <!-- Top node: Auth -->
  <circle cx="60" cy="7"  r="5" fill="#2ecc71" opacity="0.20"/>
  <circle cx="60" cy="7"  r="5" fill="none" stroke="#2ecc71" stroke-width="1.2"/>
  <text x="60" y="8.5" text-anchor="middle" font-size="3.5" fill="#27ae60" font-family="monospace">Auth</text>
  <!-- Left node: DB -->
  <circle cx="27" cy="19" r="5" fill="#9b59b6" opacity="0.20"/>
  <circle cx="27" cy="19" r="5" fill="none" stroke="#9b59b6" stroke-width="1.2"/>
  <text x="27" y="20.5" text-anchor="middle" font-size="3.5" fill="#8e44ad" font-family="monospace">DB</text>
  <!-- Right node: SVC -->
  <circle cx="93" cy="19" r="5" fill="#e67e22" opacity="0.20"/>
  <circle cx="93" cy="19" r="5" fill="none" stroke="#e67e22" stroke-width="1.2"/>
  <text x="93" y="20.5" text-anchor="middle" font-size="3.5" fill="#d35400" font-family="monospace">SVC</text>
  <!-- Left-bottom node: UI -->
  <circle cx="23" cy="38" r="5" fill="#e74c3c" opacity="0.20"/>
  <circle cx="23" cy="38" r="5" fill="none" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="23" y="39.5" text-anchor="middle" font-size="3.5" fill="#c0392b" font-family="monospace">UI</text>
  <!-- Right-bottom node: CDN -->
  <circle cx="97" cy="38" r="5" fill="#1abc9c" opacity="0.20"/>
  <circle cx="97" cy="38" r="5" fill="none" stroke="#1abc9c" stroke-width="1.2"/>
  <text x="97" y="39.5" text-anchor="middle" font-size="3.5" fill="#16a085" font-family="monospace">CDN</text>
  <!-- Footer label -->
  <text x="60" y="47" text-anchor="middle" font-size="4.5" fill="#6a6a8a" font-family="monospace">Architecture</text>
</svg>
